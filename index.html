<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Fighter 2 - Select Screen</title>
    <link rel="icon" href="media/fav.png">
    <!-- CSS -->
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div id="musica">
        <audio autoplay loop id="audio">
            <source src="media/sfx/Character Select.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="sfx"></div>

    <div class="container">
        <div class="player-select"></div><br>
        <div class="mundo" id="mundo"></div><br>
    </div>

    <div class="selection">
        <div class="char">
            <div id="name"></div>
            <div class="portraits" id="portraits"></div>
        </div>
        
        <div class="menu">
            <table>
                <tbody>
                    <tr>
                        <td><button class="botao" data-character="ryu" aria-label="Selecionar Ryu">1</button></td>
                        <td><button class="botao" data-character="honda" aria-label="Selecionar E. Honda">2</button></td>
                        <td><button class="botao" data-character="blanka" aria-label="Selecionar Blanka">3</button></td>
                        <td><button class="botao" data-character="guile" aria-label="Selecionar Guile">4</button></td>
                        <td><button class="botao" data-character="balrog" aria-label="Selecionar Balrog">5</button></td>
                        <td><button class="botao" data-character="vega" aria-label="Selecionar Vega">6</button></td>
                    </tr>
                    <tr>
                        <td><button class="botao" data-character="ken" aria-label="Selecionar Ken">7</button></td>
                        <td><button class="botao" data-character="chunli" aria-label="Selecionar Chun-Li">8</button></td>
                        <td><button class="botao" data-character="zangief" aria-label="Selecionar Zangief">9</button></td>
                        <td><button class="botao" data-character="dhalsim" aria-label="Selecionar Dhalsim">10</button></td>
                        <td><button class="botao" data-character="sagat" aria-label="Selecionar Sagat">11</button></td>
                        <td><button class="botao" data-character="bison" aria-label="Selecionar Bison">12</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="lobby" id="lobby"></div>
    </div>

    <div class="container">
        <div class="reset">
            <button onclick="reset()">RESET</button>
        </div>
    </div>

    <!--RODAPÉ-->
    <footer>
        <div class="rodape">
            <p>Todos os direitos reservados à Capcom ©</p>
        </div>
    </footer>
</body>
<!-- JAVASCRIPT -->
<script  src="JS/script.js"></script>
</html>
